# Netlify deployment config for AI Academy (static Vite build, no backend).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()"
    X-Frame-Options = "SAMEORIGIN"
    # HSTS — Vercel sets this automatically; Netlify does not, so set it here for parity.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP notes: 'wasm-unsafe-eval' (+ 'unsafe-eval' for cross-browser Pyodide) and the
    # jsdelivr origins are REQUIRED for the in-browser Python lessons; jsdelivr in
    # connect-src is for the WASM/package fetch; Google Fonts needs the font/style origins.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.supabase.co wss://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
