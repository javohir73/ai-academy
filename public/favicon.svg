<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AI Academy favicon">
  <!-- Theme-aware: the "AI" monogram is dark ink on light tab bars and light
       ink on dark tab bars, so it stays visible in both OS/browser themes.
       The blue accent dot reads on either background. -->
  <style>
    .ink { fill: #18181b; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #f7f8fa; }
    }
  </style>
