  <path class="ink" d="M25.8 49 39.2 15h6.2L32 49h-6.2Z"/>
  <path class="ink" d="M45.8 49 34.6 21.2 37.8 13 52 49h-6.2Z"/>
  <path class="ink" d="M21.6 39h23.1l2.2 5.8H19.3l2.3-5.8Z"/>
  <circle cx="32" cy="15" r="3.2" fill="#3b82f6"/>
</svg>
